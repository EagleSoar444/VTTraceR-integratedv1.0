<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>VT Tracer Improved App v1.3 Ballistic Lab</title>
<style>
:root{--bg:#10130f;--panel:#1b2118;--text:#f4f1e8;--muted:#b8b19f;--orange:#ff7a1a;--green:#556b2f;--tan:#c2a66d;--red:#ff4d2e;--border:rgba(255,255,255,.12)}
*{box-sizing:border-box}body{margin:0;background:#10130f;color:var(--text);font-family:Arial,system-ui,sans-serif}.app{min-height:100vh;background:radial-gradient(circle at top left,rgba(255,122,26,.18),transparent 400px),linear-gradient(135deg,#0f120d,#171c14)}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;padding:18px;background:#0c0f0a;border-right:1px solid var(--border)}.brand{display:flex;gap:12px;align-items:center;padding-bottom:18px;border-bottom:1px solid var(--border);margin-bottom:18px}.logo{width:46px;height:46px;border-radius:14px;background:var(--orange);color:#15120d;display:grid;place-items:center;font-weight:900}.brand small{display:block;color:var(--muted)}
.nav button{width:100%;display:block;text-align:left;margin:7px 0;padding:12px;border-radius:14px;border:1px solid transparent;background:transparent;color:var(--muted)}.nav button.active{background:rgba(255,122,26,.17);border-color:rgba(255,122,26,.35);color:white}
main{margin-left:260px;padding:24px}.hero{display:flex;justify-content:space-between;gap:16px;margin-bottom:18px;padding:24px;border:1px solid var(--border);border-radius:24px;background:linear-gradient(135deg,rgba(37,45,32,.96),rgba(18,22,16,.96))}.kicker{color:var(--orange);font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;margin:0 0 8px}h1{font-size:clamp(34px,5vw,62px);line-height:.95;margin:0 0 8px}.hero p{color:var(--muted);max-width:850px;margin:0}.pill{align-self:center;border:1px solid var(--border);border-radius:18px;padding:14px;background:rgba(27,33,24,.9);color:var(--tan);font-weight:900}.dot{display:inline-block;width:11px;height:11px;border-radius:50%;background:var(--red);box-shadow:0 0 16px var(--red);margin-right:8px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}.grid3{display:grid;grid-template-columns:300px 1fr 300px;gap:18px;margin-bottom:18px}.grid2{display:grid;grid-template-columns:1.2fr .8fr;gap:18px;margin-bottom:18px}.card,.metric{border:1px solid var(--border);border-radius:18px;background:rgba(27,33,24,.92);padding:18px;box-shadow:0 14px 35px rgba(0,0,0,.22)}.card h2{margin:0 0 14px;color:var(--tan)}.metric strong{font-size:42px;color:var(--orange);display:block}.metric small,.muted{color:var(--muted)}
.row{border:1px solid var(--border);border-radius:14px;background:rgba(255,255,255,.04);padding:13px;margin-bottom:10px}.rowTop{display:flex;justify-content:space-between;gap:10px}.badge{background:var(--orange);color:#15120d;border-radius:999px;padding:3px 8px;font-weight:900}.event{border-left:4px solid var(--green)}.event.high{border-left-color:var(--orange)}.event.critical{border-left-color:var(--red)}.event p{color:var(--muted);margin:8px 0}.tags{display:flex;gap:6px;flex-wrap:wrap}.tags span{border:1px solid var(--border);border-radius:999px;color:var(--tan);padding:3px 8px;font-size:12px}
.media{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.photo{border:1px solid var(--border);border-radius:16px;padding:12px;background:rgba(255,255,255,.04)}.photoArt{height:130px;border-radius:12px;display:grid;place-items:center;margin-bottom:10px;background:linear-gradient(135deg,rgba(255,122,26,.25),rgba(85,107,47,.35));color:var(--tan);font-weight:900}.bar{height:7px;background:rgba(255,255,255,.1);border-radius:999px;overflow:hidden;margin:10px 0 5px}.bar div{height:100%;background:var(--orange)}
table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid var(--border);padding:10px;text-align:left}th{color:var(--tan)}.map{min-height:420px;border:1px solid var(--border);border-radius:18px;background:repeating-linear-gradient(45deg,rgba(255,255,255,.04) 0 1px,transparent 1px 18px),linear-gradient(135deg,rgba(85,107,47,.25),rgba(255,122,26,.09));position:relative}.pin{position:absolute;transform:translate(-50%,-50%);border:1px solid var(--border);border-radius:999px;background:#0c0f0a;color:var(--tan);padding:7px 10px;font-size:12px;font-weight:800}.bottom{display:none}

.ballistic-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.range-card{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.range-card div{border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,.035);padding:10px}
.warn{border-left:4px solid var(--orange);padding:12px;background:rgba(255,122,26,.08);border-radius:12px;color:var(--muted)}
.formrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.formrow input,.formrow select{width:100%;border:1px solid var(--border);background:rgba(0,0,0,.2);color:var(--text);border-radius:12px;padding:10px;margin-bottom:10px}

@media(max-width:1050px){.sidebar{display:none}main{margin-left:0;padding-bottom:88px}.bottom{display:grid;position:fixed;left:10px;right:10px;bottom:10px;grid-template-columns:repeat(5,1fr);background:#0c0f0a;border:1px solid var(--border);border-radius:22px;overflow:hidden}.bottom button{border:0;background:transparent;color:var(--muted);padding:10px 2px;font-size:12px}.bottom button.active{color:var(--orange);background:rgba(255,122,26,.1)}}@media(max-width:850px){.grid4,.grid3,.grid2,.media{grid-template-columns:1fr 1fr}}@media(max-width:650px){main{padding:14px 14px 88px}.hero,.grid4,.grid3,.grid2,.media{display:grid;grid-template-columns:1fr}.rowTop{display:block}.pill{min-width:0}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar"><div class="brand"><div class="logo">VT</div><div><strong>VT Tracer</strong><small>Improved GitHub App v1.3 Ballistic Lab</small></div></div><nav class="nav" id="nav"></nav></aside>
  <main id="main"></main>
  <nav class="bottom" id="bottom"></nav>
</div>
<script>
var page="dashboard";
var nav=[["dashboard","Command"],["ai","AI Media"],["hunt","Hunt"],["ballistics","Ballistics"],["property","Property"],["map","Map"],["comms","Comms"],["reports","Reports"]];
var events=[
["Target Buck Detected","Split G2 detected near East Plot camera. Confidence 88%.","critical","6:42 AM","Spypoint · East Plot · Target Buck"],
["Best Stand Updated","North Box recommended from 5:45-8:15 AM based on wind and movement history.","high","7:18 AM","Prediction · Wind · North Box"],
["Member Checked In","Hunter 2 checked into South Ladder Stand.","normal","5:55 AM","Crew · Safety"],
["Camera Battery Low","Spypoint North Creek battery low; task added to Property Ops.","high","8:04 AM","Camera · Maintenance"],
["Food Plot Activity Spike","West Clover had 14 deer detections in the last 48 hours.","normal","Yesterday","Food Plot · Pattern"]
];
var media=[
["Split G2","Whitetail Buck","East Plot",88,"Target","6:42 AM"],
["Turkey Flock","Turkey","South Field",91,"Species","7:05 AM"],
["Coyote","Predator","Creek Crossing",84,"Alert","2:13 AM"],
["Unknown Buck","Whitetail Buck","North Ridge",72,"Review","5:51 AM"],
["Doe Group","Whitetail Doe","West Clover",95,"Pattern","6:10 PM"],
["Black Bear","Bear","Creek Bend",82,"Alert","11:22 PM"]
];
var tasks=[
["Spypoint North Creek battery replacement","Camera Maintenance","Open","High"],
["Clover plot mowing complete","Food Plot","Complete","Normal"],
["Tractor fuel level below 25%","Equipment","Open","Normal"],
["Upload soil test document","Documents","In Progress","Normal"],
["Check feeder at South Field","Inventory","Open","High"],
["Inspect South Ladder straps","Stand Safety","Open","Critical"]
];
function esc(x){return String(x==null?"":x).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]||c})}
function go(p){page=p;render();window.scrollTo(0,0)}
function header(k,t,d){return '<section class="hero"><div><p class="kicker">'+esc(k)+'</p><h1>'+esc(t)+'</h1><p>'+esc(d)+'</p></div><div class="pill"><span class="dot"></span>Live Command Mode</div></section>'}
function metrics(){var m=[["82","Hunt Score","North Farm today"],["46","AI Photos","review queue"],["18","Events","last 24 hours"],["6","Open Tasks","property ops"]];return '<section class="grid4">'+m.map(function(x){return '<article class="metric"><strong>'+x[0]+'</strong><span>'+x[1]+'</span><small>'+x[2]+'</small></article>'}).join('')+'</section>'}
function feed(n){var arr=n?events.slice(0,n):events;return '<section class="card"><h2>Unified Intel Feed</h2>'+arr.map(function(e){return '<article class="row event '+e[2]+'"><div class="rowTop"><strong>'+esc(e[0])+'</strong><small class="muted">'+esc(e[3])+'</small></div><p>'+esc(e[1])+'</p><div class="tags"><span>'+esc(e[4])+'</span></div></article>'}).join('')+'</section>'}
function channels(){var c=[["Main Camp","General crew communication",4],["Morning Rut Hunt","Active hunt coordination",2],["Camera Intel","Spypoint and AI alerts",8],["Property Ops","Maintenance and inventory",1],["Emergency / Recovery","Safety coordination",0]];return '<section class="card"><h2>Channels</h2>'+c.map(function(x){return '<article class="row"><div class="rowTop"><div><strong>'+esc(x[0])+'</strong><small class="muted">'+esc(x[1])+'</small></div>'+(x[2]?'<b class="badge">'+x[2]+'</b>':'')+'</div></article>'}).join('')+'</section>'}
function crew(){var c=[["Hunter 1","Hunting · North Box · OK"],["Hunter 2","Checked In · South Ladder · OK"],["Property Ops","Working · Equipment Shed · OK"],["Guest Hunter","Camp · Main Cabin · OK"]];return '<section class="card"><h2>Crew Status</h2>'+c.map(function(x){return '<article class="row"><strong>'+esc(x[0])+'</strong><small class="muted">'+esc(x[1])+'</small></article>'}).join('')+'</section>'}
function mediaGrid(){return '<section class="card"><h2>AI Media Command</h2><div class="media">'+media.map(function(p){return '<article class="photo"><div class="photoArt">'+esc(p[4])+'</div><strong>'+esc(p[0])+'</strong><small class="muted">'+esc(p[1])+' · '+esc(p[2])+' · '+esc(p[5])+'</small><div class="bar"><div style="width:'+p[3]+'%"></div></div><em class="muted">'+p[3]+'% AI confidence</em></article>'}).join('')+'</div></section>'}
function property(){return '<section class="card"><h2>Property Operations</h2><table><tr><th>Task</th><th>Category</th><th>Status</th><th>Priority</th></tr>'+tasks.map(function(t){return '<tr><td>'+esc(t[0])+'</td><td>'+esc(t[1])+'</td><td>'+esc(t[2])+'</td><td>'+esc(t[3])+'</td></tr>'}).join('')+'</table></section>'}
function hunt(){return header("Predictability Engine","Best Hunting Intelligence","Stand recommendations, target deer patterning, hunt score, wind logic, pressure notes, and movement analysis.")+'<section class="grid2"><section class="card"><h2>Today\'s Top Recommendations</h2><article class="row"><div class="rowTop"><strong>North Box</strong><b class="badge">82</b></div><small class="muted">Best 5:45-8:15 AM; wind favorable; recent target buck activity.</small></article><article class="row"><div class="rowTop"><strong>East Plot Blind</strong><b class="badge">71</b></div><small class="muted">Evening food plot watch; activity rising but entry route risk medium.</small></article></section><section class="card"><h2>Target Deer Profiles</h2><article class="row"><strong>Split G2</strong><small class="muted">Target · Last seen East Plot · 88% ID confidence</small></article><article class="row"><strong>Tall 8</strong><small class="muted">Watchlist · Mostly night movement · North Ridge</small></article></section></section>'}
function mapPage(){return header("Map & Land Use","Property Intelligence Map","Visualize stands, cameras, food plots, roads, movement zones, sanctuary areas, and property operations.")+'<section class="grid2"><section class="card"><h2>Property Map</h2><div class="map"><span class="pin" style="left:23%;top:26%">North Box</span><span class="pin" style="left:68%;top:65%">East Plot</span><span class="pin" style="left:50%;top:38%">Creek Cam</span><span class="pin" style="left:78%;top:28%">South Ladder</span></div></section><section class="card"><h2>Map Layers</h2><article class="row">Stands & blinds</article><article class="row">Trail cameras</article><article class="row">Food plots</article><article class="row">Movement heat zones</article><article class="row">Maintenance tasks</article></section></section>'}
function reports(){return header("Reports & Analytics","Season Intelligence Reports","Summaries for activity trends, property work, camera performance, target deer, and hunt results.")+'<section class="grid2"><section class="card"><h2>Activity Summary</h2><table><tr><th>Metric</th><th>Value</th></tr><tr><td>Most Active Camera</td><td>East Plot</td></tr><tr><td>Top Species</td><td>Whitetail Deer</td></tr><tr><td>Best Time Window</td><td>6:00-8:00 AM</td></tr><tr><td>Task Completion</td><td>42%</td></tr></table></section><section class="card"><h2>Export Ideas</h2><article class="row">PDF property report</article><article class="row">Trail camera AI report</article><article class="row">Season hunt log</article></section></section>'}

function ballisticLab(){
return header("Ballistic Lab","Range Data, DOPE Cards & Field Ballistics","A dedicated ballistic workspace for rifle profiles, ammo data, range-card planning, environmental notes, and ethical-shot logging.")+
'<section class="grid2"><section class="card"><h2>Rifle / Ammo Profile</h2><div class="formrow"><input placeholder="Rifle name e.g. .308 Deer Rifle"><input placeholder="Caliber e.g. .308 Win"><input placeholder="Bullet weight e.g. 165 gr"><input placeholder="BC e.g. 0.435"><input placeholder="Muzzle velocity e.g. 2700 fps"><input placeholder="Zero range e.g. 100 yd"></div><button class="badge">Save Profile Placeholder</button><p class="warn">Preview only: verify all ballistic data with your rifle, ammunition, chronograph, optic, and actual range testing before field use.</p></section><section class="card"><h2>Environmental Inputs</h2><div class="formrow"><input placeholder="Temperature °F"><input placeholder="Pressure / altitude"><input placeholder="Humidity %"><input placeholder="Wind speed mph"><select><option>Wind direction</option><option>Full value left</option><option>Full value right</option><option>Quartering</option></select><input placeholder="Shot angle degrees"></div><button class="badge">Calculate Placeholder</button></section></section>'+
'<section class="grid2"><section class="card"><h2>Sample Range Card</h2><div class="range-card"><div><strong>100 yd</strong><small class="muted">Zero</small></div><div><strong>200 yd</strong><small class="muted">Hold + DOPE</small></div><div><strong>300 yd</strong><small class="muted">Drop / wind</small></div><div><strong>400 yd</strong><small class="muted">Verify only</small></div></div><table><tr><th>Range</th><th>Drop</th><th>Wind</th><th>Energy</th></tr><tr><td>100</td><td>0</td><td>0</td><td>Profile based</td></tr><tr><td>200</td><td>Placeholder</td><td>Placeholder</td><td>Placeholder</td></tr><tr><td>300</td><td>Placeholder</td><td>Placeholder</td><td>Placeholder</td></tr><tr><td>400</td><td>Placeholder</td><td>Placeholder</td><td>Placeholder</td></tr></table></section><section class="card"><h2>Ethical Shot Log</h2><article class="row"><strong>Max confirmed range</strong><small class="muted">Set after actual range verification.</small></article><article class="row"><strong>Preferred hunting zero</strong><small class="muted">Save per rifle and load.</small></article><article class="row"><strong>Field notes</strong><small class="muted">Wind, rest type, shot angle, animal position, and confidence.</small></article><article class="row"><strong>Linked hunt records</strong><small class="muted">Connect to harvest/sighting reports later.</small></article></section></section>'+
'<section class="grid2"><section class="card"><h2>Ballistic Lab Modules to Integrate</h2><article class="row">Rifle profiles</article><article class="row">Ammo/load library</article><article class="row">Scope turret/reticle notes</article><article class="row">Range card exports</article><article class="row">DOPE history</article><article class="row">Chronograph sessions</article></section><section class="card"><h2>Safety & Validation</h2><p class="warn">This app should not make unsafe shot decisions. Treat calculated values as planning aids only. Confirm zero, drop, wind, and ethical range through live-fire verification and comply with all laws and safe firearm handling rules.</p></section></section>';
}

function content(){if(page==="ai")return header("Spypoint + AI Recognition","AI Media Command Center","Sort, label, filter, and review trail camera photos by species, confidence, camera, target deer, and property zone.")+mediaGrid();if(page==="hunt")return hunt();if(page==="ballistics")return ballisticLab();if(page==="property")return header("Property Manager","Operations, Maintenance & Inventory","Manage equipment, land use, food plots, contacts, documents, tasks, camera health, and field operations.")+'<section class="grid2">'+property()+'<section class="card"><h2>Add Quick Task</h2><p class="muted">GitHub preview only: actions are visual placeholders.</p><input placeholder="Task title"><br><br><button class="badge">Add Task Placeholder</button></section></section>';if(page==="map")return mapPage();if(page==="comms")return header("Field Communications","Crew Messaging & Live Hunt Rooms","Coordinate hunters, live streams, photo shares, alerts, property operations, and safety check-ins.")+'<section class="grid3">'+channels()+feed()+crew()+'</section>';if(page==="reports")return reports();return header("VT Tracer Improved","Hunting Intelligence & Property Operations Command","GitHub-runnable improved concept with AI photo recognition, species tracking, hunt predictability, communications, and property management.")+metrics()+'<section class="grid3">'+channels()+feed(4)+crew()+'</section><section class="grid2">'+mediaGrid()+property()+'</section>'}
function renderNav(){document.getElementById("nav").innerHTML=nav.map(function(n){return '<button class="'+(page===n[0]?'active':'')+'" onclick="go(\''+n[0]+'\')">'+n[1]+'</button>'}).join('');document.getElementById("bottom").innerHTML=nav.slice(0,5).map(function(n){return '<button class="'+(page===n[0]?'active':'')+'" onclick="go(\''+n[0]+'\')">'+n[1]+'</button>'}).join('')}
function render(){renderNav();document.getElementById("main").innerHTML=content()}
render();
</script>
</body>
</html>
